<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Наша История — Аделя ♡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600&display=swap');

:root {
  --olive: #5c6b3a;
  --olive-light: #8a9e5a;
  --olive-pale: #d4dcb8;
  --cream: #faf7ee;
  --cream-dark: #f0eada;
  --gold: #c9a84c;
  --text: #2c2a1e;
  --text-dim: #7a7255;
  --rose: #d4877a;
  --bg: #1a1c12;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--cream);
  overflow-x: hidden;
}

/* BG texture */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(92,107,58,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(92,107,58,0.1) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ══════ SCREENS ══════ */
.screen { display:none; flex-direction:column; align-items:center; min-height:100vh; padding:0; position:relative; z-index:1; }
.screen.active { display:flex; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

/* ══════ INTRO ══════ */
#s-intro {
  justify-content:center;
  background: linear-gradient(180deg, #0e1009 0%, #1a1c12 40%, #141a0d 100%);
  padding: 40px 24px;
  text-align: center;
  gap: 0;
}

.intro-flowers {
  font-size: 32px;
  letter-spacing: 12px;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.intro-title {
  font-family: 'Cinzel', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--olive-light);
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(138,158,90,0.4);
  margin-bottom: 6px;
  line-height: 1.2;
}
.intro-heart { color: var(--rose); font-size: 28px; margin: 10px 0; display: block; }
.intro-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 32px;
}

/* Photo collage on intro */
.intro-photos {
  display: flex;
  gap: 10px;
  margin: 24px 0;
  justify-content: center;
  flex-wrap: wrap;
}
.intro-photos .ph {
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid rgba(138,158,90,0.4);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  position: relative;
}
.intro-photos .ph img {
  display:block; object-fit:cover;
  transition: transform 0.4s;
}
.intro-photos .ph:hover img { transform: scale(1.05); }
.ph.big { width:160px; height:200px; }
.ph.med { width:120px; height:150px; }
.ph.sm { width:90px; height:110px; }
.ph .ph-label {
  position:absolute; bottom:0; left:0; right:0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  padding: 8px 6px 6px;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.8);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  text-align: center;
}

/* ══════ BTN START ══════ */
.btn-start {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--bg);
  background: linear-gradient(135deg, #b8d870, var(--olive-light), var(--olive));
  border: none; border-radius: 50px;
  padding: 16px 44px;
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 4px 24px rgba(92,107,58,0.4);
  transition: all 0.25s;
  text-transform: uppercase;
  margin-top: 8px;
}
.btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(92,107,58,0.55); }

/* ══════ GAME LAYOUT ══════ */
#s-game {
  flex-direction: column;
  min-height: 100vh;
  padding: 0;
}

/* Top bar */
.game-bar {
  width:100%;
  background: rgba(14,16,9,0.95);
  border-bottom: 1px solid rgba(138,158,90,0.25);
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top:0; z-index:50;
}
.bar-chapter {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--olive-light);
  text-transform: uppercase;
}
.bar-progress {
  display: flex; gap: 5px;
}
.bar-dot {
  width:8px; height:8px; border-radius:50%;
  background: rgba(138,158,90,0.2);
  border: 1px solid rgba(138,158,90,0.4);
  transition: all 0.3s;
}
.bar-dot.done { background: var(--olive-light); }
.bar-score {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
}

/* Scene */
.scene {
  flex: 1;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  padding: 20px 20px 100px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Scene photo */
.scene-photo {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(138,158,90,0.3);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  position: relative;
  max-height: 280px;
}
.scene-photo img {
  width:100%; height:280px; object-fit:cover; display:block;
}
.scene-photo .sp-overlay {
  position:absolute; inset:0;
  background: linear-gradient(transparent 50%, rgba(0,0,0,0.6));
}
.scene-photo .sp-caption {
  position:absolute; bottom:12px; left:0; right:0;
  text-align:center;
  font-family: 'Cormorant Garamond', serif;
  font-style:italic; font-size:13px;
  color:rgba(255,255,255,0.85);
  letter-spacing:1px;
}

/* Dialogue bubble */
.dialogue {
  background: rgba(20,24,13,0.95);
  border: 1px solid rgba(138,158,90,0.3);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative;
}
.dialogue::before {
  content:'';
  position:absolute; top:-6px; left:24px;
  width:12px; height:12px;
  background: rgba(20,24,13,0.95);
  border-top: 1px solid rgba(138,158,90,0.3);
  border-left: 1px solid rgba(138,158,90,0.3);
  transform: rotate(45deg);
}
.dialogue .speaker {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px;
  color: var(--olive-light); text-transform:uppercase; margin-bottom:8px;
}
.dialogue .dtext {
  font-size:15px; line-height:1.65; color:var(--cream);
}
.dialogue .dtext em { color: var(--olive-pale); font-style:italic; }

/* Choices */
.choices {
  display: flex; flex-direction:column; gap:10px;
}
.choice-btn {
  text-align:left;
  background: rgba(92,107,58,0.08);
  border: 1px solid rgba(138,158,90,0.25);
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  font-family:'Nunito',sans-serif; font-size:14px; color:var(--cream);
  transition:all 0.2s;
  display:flex; align-items:center; gap:12px;
}
.choice-btn:hover {
  background: rgba(92,107,58,0.2);
  border-color: var(--olive-light);
  transform: translateX(4px);
}
.choice-btn .c-icon { font-size:20px; flex-shrink:0; }
.choice-btn .c-pts {
  margin-left:auto; flex-shrink:0;
  font-family:'Cinzel',serif; font-size:10px; color:var(--gold); white-space:nowrap;
}

/* Result popup */
.result-popup {
  position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.result-popup.hidden { display:none; }
.rp-card {
  background: linear-gradient(160deg,#1e2414,#141a0d);
  border:1px solid var(--olive-light);
  border-radius:20px; padding:36px 28px; max-width:360px; width:100%; text-align:center;
  box-shadow: 0 0 60px rgba(92,107,58,0.3);
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.rp-emoji { font-size:56px; display:block; margin-bottom:14px; }
.rp-label {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:5px;
  color:var(--olive-light); text-transform:uppercase; margin-bottom:10px;
}
.rp-text { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); margin-bottom:8px; }
.rp-sub { font-size:13px; font-style:italic; color:var(--text-dim); margin-bottom:24px; line-height:1.5; }
.rp-btn {
  font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px;
  color:var(--bg); background:linear-gradient(135deg,#b8d870,var(--olive-light));
  border:none; border-radius:30px; padding:12px 28px; cursor:pointer;
  text-transform:uppercase; font-weight:700; transition:all 0.2s;
}
.rp-btn:hover { transform:translateY(-2px); }

/* ══════ FINALE ══════ */
#s-finale {
  justify-content:center; padding:32px 24px; text-align:center; gap:20px;
  background: linear-gradient(180deg,#0e1009,#1a1c12);
}
.finale-score-ring {
  width:120px; height:120px; border-radius:50%;
  border:2px solid rgba(138,158,90,0.4);
  background:radial-gradient(circle,rgba(92,107,58,0.12),transparent);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  margin:0 auto; box-shadow:0 0 40px rgba(92,107,58,0.2);
}
.finale-score-big {
  font-family:'Cinzel',serif; font-size:36px; font-weight:700; color:var(--olive-light); line-height:1;
}
.finale-score-lbl {
  font-family:'Cinzel',serif; font-size:8px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase;
}
.finale-title {
  font-family:'Cinzel',serif; font-size:22px; color:var(--cream); letter-spacing:2px;
}
.finale-sub {
  font-style:italic; font-size:15px; color:var(--text-dim); line-height:1.6; max-width:340px;
}

.photos-finale {
  display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
}
.pf-item {
  border-radius:12px; overflow:hidden;
  border:2px solid rgba(138,158,90,0.35);
  box-shadow:0 6px 20px rgba(0,0,0,0.5);
}
.pf-item img { display:block; object-fit:cover; }

.finale-prize {
  background:rgba(138,158,90,0.08);
  border:1px solid rgba(138,158,90,0.3);
  border-radius:14px; padding:20px 24px;
  max-width:340px; width:100%;
}
.fp-emoji { font-size:40px; display:block; margin-bottom:10px; }
.fp-name {
  font-family:'Cinzel',serif; font-size:18px; color:var(--olive-pale); letter-spacing:2px; margin-bottom:6px;
}
.fp-desc { font-size:13px; font-style:italic; color:var(--text-dim); line-height:1.5; }

.confetti-piece {
  position:fixed; width:8px; height:8px; border-radius:2px;
  animation:cfFall 3s ease-in forwards; z-index:200; pointer-events:none;
}
@keyframes cfFall {
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
</style>
</head>

  {

    caption: 'Алтай — наше первое большое приключение 🏔️',
    speaker: 'Вупи',
    text: 'Помню как пчела тебя укусила... ты была такая удивлённая 😄 Зато какие горы, какое небо!',
    question: 'Какое главное воспоминание с Алтая?',
    choices: [
      { icon:'🐝', text:'Та самая пчела 😄', pts:3 },

      { icon:'🛣️', text:'Дорога и музыка в машине', pts:4 },
    ],
    best: -1,
    feedback_ok: '🏔️ Любой ответ правильный — там всё было волшебно!',
    feedback_any: '🏔️ 150 000 км начинались именно там!',
  },
  {
    chapter: 'Глава 4 · Цветы Адели',
    photo: null,
    emoji_scene: '🌿🌸🌼🌺🌿',
    speaker: 'Аделя',
    text: 'Каждый букет — это маленькая история. Я вкладываю в цветы <em>всё своё настроение</em>...',

      { icon:'🌹', text:'Роза — классика и страсть', pts:3 },

      { icon:'🌸', text:'Пион — нежность и романтика', pts:4 },
      { icon:'🌻', text:'Подсолнух — радость каждый день', pts:4 },
    ],
    best: 1,
    feedback_ok: '🌿 Оливковый и эвкалипт — это твой стиль до мелочей!',

// ═══════════════════════════════════════
const PRIZES = [
  { emoji:'🍎', name:'Золотое яблоко', desc:'Особый подарок только для тебя!' },
  { emoji:'💆‍♀️', name:'Сертификат Массаж', desc:'Профессиональный массаж — ты заслужила!' },
  { emoji:'🧖‍♀️', name:'Сертификат СПА', desc:'День красоты и расслабления 💚' },
];

const MAX = scenes.reduce((s,sc) => s + Math.max(...sc.choices.map(c=>c.pts)), 0);

let cur = 0, score = 0, pendingNext = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  cur = 0; score = 0;
  buildProgress();
  showScreen('s-game');
  renderScene();
}

function buildProgress() {
  const wrap = document.getElementById('barProgress');
  wrap.innerHTML = '';
  scenes.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'bar-dot'; d.id = 'dot-'+i;
    wrap.appendChild(d);
  });
}

function renderScene() {
  if (cur >= scenes.length) { showFinale(); return; }
  const sc = scenes[cur];
  document.getElementById('barChapter').textContent = sc.chapter;
  document.getElementById('barScore').textContent = score;
  if (cur > 0) document.getElementById('dot-'+(cur-1)).classList.add('done');

  let photoHtml = '';
  if (sc.photo) {
    photoHtml = `<div class="scene-photo">
      <img src="${PHOTOS[sc.photo]}" alt="">
      <div class="sp-overlay"></div>
      <div class="sp-caption">${sc.caption}</div>
    </div>`;
  } else if (sc.emoji_scene) {
    photoHtml = `<div style="text-align:center;font-size:40px;letter-spacing:10px;padding:24px 0;background:rgba(92,107,58,0.08);border-radius:16px;border:1px solid rgba(138,158,90,0.2);">${sc.emoji_scene}</div>`;
  }

  const choicesHtml = sc.choices.map((c,i) =>
    `<button class="choice-btn" onclick="pick(${i})">
      <span class="c-icon">${c.icon}</span>
      <span>${c.text}</span>
      <span class="c-pts">+${c.pts} 🌿</span>
    </button>`
  ).join('');

  document.getElementById('sceneWrap').innerHTML = `
    ${photoHtml}
    <div class="dialogue">
      <div class="speaker">${sc.speaker}</div>
      <div class="dtext">${sc.text}</div>
    </div>
    <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:#5c6b3a;text-align:center;">— ВЫБЕРИ ОТВЕТ —</div>
    <div class="choices">${choicesHtml}</div>
  `;
}

function pick(idx) {
  const sc = scenes[cur];
  const choice = sc.choices[idx];
  score += choice.pts;
  document.getElementById('barScore').textContent = score;

  const isGreat = idx === sc.best || sc.best === -1 || choice.pts === Math.max(...sc.choices.map(c=>c.pts));
  const popup = document.getElementById('resultPopup');
  document.getElementById('rpEmoji').textContent = isGreat ? '🌟' : '✨';
  document.getElementById('rpLabel').textContent = isGreat ? '✦ отличный выбор ✦' : '✦ хороший ответ ✦';
  document.getElementById('rpText').textContent = choice.icon + ' ' + choice.text;
  document.getElementById('rpSub').textContent = isGreat ? sc.feedback_ok : sc.feedback_any;
  document.getElementById('rpBtn').textContent = cur < scenes.length-1 ? 'Следующая глава →' : '✦ Финал ✦';
  popup.classList.remove('hidden');
  cur++;
}

function closeResult() {
  document.getElementById('resultPopup').classList.add('hidden');
  if (cur < scenes.length) renderScene();
  else showFinale();
}

function showFinale() {
  showScreen('s-finale');
  document.getElementById('finalScore').textContent = score;
  const pct = score / MAX;
  let title, sub;
  if (pct >= 0.8)      { title = '🌟 Идеальный результат!'; sub = 'Ты знаешь наши моменты наизусть. Я люблю тебя, Аделя 💚'; }
  else if (pct >= 0.55) { title = '💚 Отличная игра!'; sub = 'Столько воспоминаний — и ты помнишь каждое!'; }
  else                  { title = '🌸 Ты справилась!'; sub = 'Главное — мы прошли этот путь вместе 💚'; }
  document.getElementById('finaleTitle').textContent = title;
  document.getElementById('finaleSub').textContent = sub + ` (${score} из ${MAX} очков)`;

  const prize = score >= 16 ? PRIZES[2] : score >= 10 ? PRIZES[1] : PRIZES[0];
  document.getElementById('finalePrize').innerHTML = `
    <span class="fp-emoji">${prize.emoji}</span>
    <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:#5c6b3a;text-transform:uppercase;margin-bottom:8px;">✦ твой приз ✦</div>
    <div class="fp-name">${prize.name}</div>
    <div class="fp-desc">${prize.desc}</div>
  `;

  launchConfetti();
}

function launchConfetti() {
  const colors = ['#8a9e5a','#c9a84c','#d4dcb8','#d4877a','#ffffff','#5c6b3a'];
  for (let i=0;i<70;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}
</script>
